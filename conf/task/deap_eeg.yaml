# @package _global_
name: "deap_eeg"

algebra:
  p: 3
  q: 1
  r: 0

dataset:
  name: "deap"
  data_root: "data/deap/data_preprocessed_python"
  subject_id: 1
  eval_mode: "cross_subject"
  window_size: 512      # 4 seconds at 128 Hz
  stride: null           # null = non-overlapping (= window_size)

model:
  channels: 16
  num_layers: 3
  num_heads: 4
  num_rotors: 8
  eta_gating: 1.5
  H_base: 0.5
  dropout: 0.1
  num_targets: 4
  use_profiler: true
training:
  epochs: 100
  lr: 0.0005
  batch_size: 32
