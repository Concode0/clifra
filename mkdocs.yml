site_name: clifra
site_url: https://concode0.github.io/clifra/
repo_url: https://github.com/Concode0/clifra
repo_name: Concode0/clifra

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            docstring_options:
              warn_missing_types: false
              warn_unknown_params: false
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source

nav:
  - Home: index.md
  - Core Design: core-design.md
  - API:
      - Package: api/index.md
      - Core: api/core.md
      - Analysis: api/analysis.md
      - Functional: api/functional.md
      - Layers: api/layers.md
      - Criteria: api/criteria.md
      - Optimizers: api/optimizers.md
  - Examples: examples/index.md
  - Decisions: decisions/index.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
