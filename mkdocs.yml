site_name: clifra
site_url: https://concode0.github.io/clifra/
repo_url: https://github.com/Concode0/clifra
repo_name: Concode0/clifra

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

  palette:
      - scheme: default
        primary: deep orange
        accent: indigo
        toggle:
            icon: material/weather-night
            name: Switch to dark mode
      - scheme: slate
        primary: black
        accent: cyan
        toggle:
            icon: material/weather-sunny
            name: Switch to light mode
      
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            docstring_options:
              warn_missing_types: false
              warn_unknown_params: false
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            filters:
              - "!^_[^_]"
            show_if_no_docstring: false

nav:
  - Home: index.md
  - Tutorials:
      - Overview: tutorials/index.md
      - First Clifford Product: tutorials/first-clifford-product.md
      - Layouts and Planned Execution: tutorials/layouts-and-plans.md
      - Learn a Geometric Transformation: tutorials/learn-geometric-transform.md
      - Train a Surface Projection: tutorials/unbend-manifold.md
  - Explanations:
      - Overview: explanations/index.md
      - Layout, Storage, and TensorContract: explanations/layout-storage-contracts.md
      - Planning Policy as Dependency Injection: explanations/planning-policy-injection.md
      - Geometric Parameterization: explanations/clifra-methodology.md
      - Bivector Exponential Methods: explanations/bivector-exponential.md
      - Optimizer Parameter Categories: explanations/optimizer-dispatch.md
      - Signatures and Algebraic Behavior: explanations/signatures-and-learning.md
      - Using clifra with PyTorch: explanations/clifra-and-pytorch.md
  - API Reference: reference/index.md
  - Benchmarks:
      - Overview: benchmarks/index.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
