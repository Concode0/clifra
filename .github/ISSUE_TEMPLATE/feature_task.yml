name: Feature Request
description: Suggest a layer, algebra operation, optimizer, adapter, or docs improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Keep it short. A use case plus a rough API sketch is enough to start.

  - type: textarea
    id: summary
    attributes:
      label: What should clifra add or change?
      placeholder: "Add a compact-layout version of ..."
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Why is this useful?
      description: Describe the workflow, model, or user need.
    validations:
      required: true

  - type: textarea
    id: sketch
    attributes:
      label: API sketch or notes
      description: Optional code, math, links, or alternatives.
      render: python
