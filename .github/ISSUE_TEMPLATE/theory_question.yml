name: Question
description: Ask about Clifford algebra behavior, API usage, or design
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Questions are welcome. Include the smallest context that makes the issue clear.

  - type: textarea
    id: question
    attributes:
      label: Question
      placeholder: "Why does this product return compact grade lanes instead of a dense multivector?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Code, signature, tensor shapes, or docs page you were reading.
      render: python
