name: Bug or Numerical Issue
description: Report incorrect output, errors, NaNs, memory pressure, or slow behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve clifra. A tiny runnable snippet is enough.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: One or two sentences are fine.
      placeholder: "RotorLayer returns NaN in Cl(4,0) on CPU."
    validations:
      required: true

  - type: input
    id: area
    attributes:
      label: Where?
      description: Module, class, function, or file path if you know it.
      placeholder: "clifra.layers.RotorLayer"

  - type: input
    id: signature
    attributes:
      label: Algebra signature
      placeholder: "Cl(3,0), Cl(4,1), Cl(2,0,1)"

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Paste the shortest code or command that shows the problem.
      render: python
      placeholder: |
        import torch
        from clifra.core.config import make_algebra

        algebra = make_algebra(3, 0, kernel="dense", device="cpu")
        x = torch.randn(2, 1, algebra.dim)
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Error output
      description: Paste traceback, warning, or observed values.
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "commit, Python version, PyTorch version, CPU/CUDA/MPS"
